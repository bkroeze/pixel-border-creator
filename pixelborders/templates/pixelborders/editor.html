{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pixel Border Creator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.css">
  <link rel="stylesheet" href="{% static 'pixelborders/app.css' %}?v=6">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body data-authenticated="{% if request.user.is_authenticated %}true{% else %}false{% endif %}">
  <header class="topbar">
    <div>
      <p class="eyebrow">CSS border-image studio</p>
      <h1>Pixel Border Creator</h1>
    </div>
    <div class="auth-controls">
      {% if request.user.is_authenticated %}
        <span class="auth-user">{{ request.user.username }}</span>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button class="ui icon button" type="submit" title="Sign out">
            <i class="sign-out icon"></i>
          </button>
        </form>
      {% else %}
        <a class="ui icon labeled button" href="{% url 'login' %}?next={{ request.path|urlencode }}">
          <i class="sign-in icon"></i>Login
        </a>
      {% endif %}
    </div>
  </header>

  <main class="app-shell">
    {% include "pixelborders/_workspace.html" %}
  </main>

  <footer class="credit">Inspired by and thanks to Broider by Max Bittker.</footer>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.js"></script>
  <script src="{% static 'pixelborders/editor.js' %}?v=6"></script>
</body>
</html>
